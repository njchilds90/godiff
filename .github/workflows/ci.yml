name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.21", "1.22", "1.23"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Verify go.mod
        run: go mod tidy && git diff --exit-code go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v -race -count=1 ./...

      - name: Vet
        run: go vet ./...
